name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agro
          POSTGRES_PASSWORD: agro
          POSTGRES_DB: agro_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agro -d agro_os_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://agro:agro@localhost:5432/agro_os_test
      AUTH_ENABLED: "false"
      SEED_DEMO_DATA: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt
      - name: Backend tests
        run: PYTHONPATH=backend python -m pytest backend/tests -q
      - name: PostgreSQL migration and locking tests
        env:
          POSTGRES_TEST_DATABASE_URL: postgresql://agro:agro@localhost:5432/agro_os_test
        run: PYTHONPATH=backend python -m pytest backend/postgres_tests -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: npm --prefix frontend ci
      - name: Frontend build
        run: npm run build
